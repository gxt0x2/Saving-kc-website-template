<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f2eb;
  color: #1a1a1a;
  font-family: 'IBM Plex Mono', monospace;
  padding: 48px 40px 80px;
  min-width: 900px;
}

header {
  margin-bottom: 40px;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #0f0f0f;
}

h1 span { color: #d4500a; }

.subtitle {
  font-size: 11px;
  color: #888;
  margin-top: 6px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.stats-row {
  display: flex;
  gap: 28px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.stat {
  font-size: 11px;
  color: #666;
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}

/* Tree Container */
.tree {
  line-height: 1;
}

/* Each node row */
.node {
  display: flex;
  flex-direction: column;
  position: relative;
}

/* The visible row (connector + label) */
.node-row {
  display: flex;
  align-items: center;
  gap: 0;
  cursor: pointer;
  user-select: none;
}

.node-row:hover .node-label { background: #ece8df; }

/* Connector lines drawn with pseudo-elements */
.connector {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: relative;
}

/* Indented children */
.children {
  margin-left: 0;
  border-left: 1.5px solid #c8c0b0;
  margin-left: 20px;
  padding-left: 0;
}

.children.collapsed { display: none; }

/* The branch line from parent to child */
.branch-line {
  width: 20px;
  height: 1.5px;
  background: #c8c0b0;
  flex-shrink: 0;
}

/* Toggle icon */
.toggle {
  width: 16px;
  height: 16px;
  border: 1.5px solid currentColor;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
  margin-right: 6px;
  transition: background 0.15s;
  line-height: 1;
}

.no-toggle {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  margin-right: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.no-toggle::after {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #bbb;
}

/* Node label */
.node-label {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 4px 10px 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  transition: background 0.12s;
  margin: 1px 0;
}

.node-label .path {
  color: #999;
  font-size: 10.5px;
}

/* Color-coded type badges */
.badge {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 600;
  flex-shrink: 0;
}

/* Root node special styling */
.root-label {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  padding: 8px 16px;
  background: #1a1a1a;
  color: #f5f2eb;
  border-radius: 6px;
  letter-spacing: -0.3px;
}

.root-label span { color: #d4500a; }

/* Type colors */
.t-root { color: #1a1a1a; }
.t-company { color: #0d7a4e; --c: #0d7a4e; }
.t-situations { color: #b84500; --c: #b84500; }
.t-guides { color: #7c3aed; --c: #7c3aed; }
.t-mo { color: #0066b3; --c: #0066b3; }
.t-ks { color: #b07000; --c: #b07000; }
.t-llm { color: #1a7a5e; --c: #1a7a5e; }
.t-legal { color: #666; --c: #666; }

.badge-company { background: #dcfce7; color: #0d7a4e; }
.badge-situations { background: #ffedd5; color: #b84500; }
.badge-guides { background: #ede9fe; color: #7c3aed; }
.badge-mo { background: #dbeafe; color: #0066b3; }
.badge-ks { background: #fef3c7; color: #b07000; }
.badge-llm { background: #d1fae5; color: #1a7a5e; }
.badge-legal { background: #f1f5f9; color: #666; }

/* Vertical connector between sibling rows */
.node > .children > .node {
  position: relative;
}

/* Legend */
.legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  font-size: 10px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.legend-item { display: flex; align-items: center; gap: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }

/* Expand/collapse all */
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}

.ctrl-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 5px 14px;
  border: 1.5px solid #c8c0b0;
  background: transparent;
  border-radius: 4px;

  color: #555;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}

.ctrl-btn:hover { background: #ece8df; color: #1a1a1a; }

/* Vertical line for last item alignment */
.node-children-wrap {
  display: flex;
}

.vert-bar {
  width: 20px;
  flex-shrink: 0;
  border-right: 1.5px solid #c8c0b0;
}
</style>

// Color type inheritance
function resolveType(node, parentType) {
  return node.type || parentType || 'company';
}

const typeColors = {
  root: '#1a1a1a',
  company: '#0d7a4e',
  situations: '#b84500',
  guides: '#7c3aed',
  mo: '#0066b3',
  ks: '#b07000',
  llm: '#1a7a5e',
  legal: '#666',
};

function buildTree(node, parentType, depth) {
  const type = resolveType(node, parentType);
  const color = typeColors[type] || '#666';
  const hasChildren = node.children && node.children.length > 0;

  const wrapper = document.createElement('div');
  wrapper.className = 'node';

  const row = document.createElement('div');
  row.className = 'node-row';

  if (depth > 0) {
    const line = document.createElement('div');
    line.className = 'branch-line';
    row.appendChild(line);
  }

  if (hasChildren) {
    const toggle = document.createElement('div');
    toggle.className = 'toggle';
    toggle.style.color = color;
    toggle.textContent = '−';
    row.appendChild(toggle);
  } else {
    const noToggle = document.createElement('div');
    noToggle.className = 'no-toggle';
    row.appendChild(noToggle);
  }

  const label = document.createElement('div');
  label.className = 'node-label';

  if (depth === 0) {
    label.className = 'node-label root-label';
    label.innerHTML = `Saving<span>KC</span>.com`;
  } else {
    const nameSpan = document.createElement('span');
    nameSpan.style.color = depth <= 2 ? color : '#333';
    nameSpan.style.fontWeight = depth <= 1 ? '600' : '400';
    nameSpan.textContent = node.label;
    label.appendChild(nameSpan);

    if (node.path) {
      const pathSpan = document.createElement('span');
      pathSpan.className = 'path';
      pathSpan.textContent = node.path;
      label.appendChild(pathSpan);
    }
  }

  row.appendChild(label);
  wrapper.appendChild(row);

  if (hasChildren) {
    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'children';
    childrenDiv.style.borderLeftColor = color + '55';

    node.children.forEach(child => {
      childrenDiv.appendChild(buildTree(child, type, depth + 1));
    });

    wrapper.appendChild(childrenDiv);

    row.addEventListener('click', () => {
      const collapsed = childrenDiv.classList.toggle('collapsed');
      row.querySelector('.toggle').textContent = collapsed ? '+' : '−';
    });
  }

  return wrapper;
}

document.getElementById('tree').appendChild(buildTree(data, null, 0));

function expandAll() {
  document.querySelectorAll('.children').forEach(el => el.classList.remove('collapsed'));
  document.querySelectorAll('.toggle').forEach(el => el.textContent = '−');
}

function collapseAll() {
  document.querySelectorAll('.children').forEach(el => {
    if (!el.closest('#tree > .node > .children') === false) return;
    el.classList.add('collapsed');
  });
  // Keep root level open, collapse everything else
  const rootChildren = document.querySelectorAll('#tree > .node > .children > .node > .children');
  rootChildren.forEach(el => {
    el.classList.add('collapsed');
    const toggle = el.previousElementSibling?.querySelector('.toggle');
    if (toggle) toggle.textContent = '+';
  });
}
